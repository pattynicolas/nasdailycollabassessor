<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout — Opportunity Scout for Nas Daily</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f6f6f4;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;
      --bg-warning: #faeeda;
      --bg-info: #e6f1fb;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #aaa;
      --text-success: #3b6d11;
      --text-danger: #a32d2d;
      --text-warning: #854f0b;
      --text-info: #185fa5;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.2);
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1c;
        --bg-secondary: #252525;
        --bg-success: #173404;
        --bg-danger: #501313;
        --bg-warning: #412402;
        --bg-info: #042c53;
        --text: #f0f0f0;
        --text-secondary: #aaa;
        --text-tertiary: #666;
        --text-success: #c0dd97;
        --text-danger: #f7c1c1;
        --text-warning: #fac775;
        --text-info: #b5d4f4;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .field-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .drop-zone {
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius);
      padding: 1.25rem;
      background: var(--bg-secondary);
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 1.25rem;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--text-secondary);
    }

    .drop-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      text-align: center;
    }

    .drop-inner i { font-size: 28px; }
    .drop-inner span { font-size: 14px; }
    .drop-inner small { font-size: 12px; color: var(--text-tertiary); }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      width: 100%;
    }

    .thumb-wrap { position: relative; display: inline-block; }

    .preview-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      display: block;
    }

    .remove-img {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg-danger);
      color: var(--text-danger);
      border: none;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    textarea {
      width: 100%;
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: var(--border-mid);
    }

    .run-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
      margin-top: 1rem;
    }

    .run-btn:hover { background: var(--bg-secondary); }
    .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: 1.5rem;
    }

    .result-section {
      padding: 1rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }

    .result-section:last-child { border-bottom: none; }

    .result-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .result-content {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
    }

    .verdict-yes { background: var(--bg-success); color: var(--text-success); }
    .verdict-no { background: var(--bg-danger); color: var(--text-danger); }
    .verdict-maybe { background: var(--bg-warning); color: var(--text-warning); }

    .verdict-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .criteria-grid {
      display: grid;
      gap: 10px;
    }

    .criterion {
      display: grid;
      grid-template-columns: minmax(92px, 0.45fr) auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: 14px;
      line-height: 1.5;
    }

    .criterion-name {
      font-weight: 500;
    }

    .criterion-score {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--radius);
      white-space: nowrap;
    }

    .score-strong { background: var(--bg-success); color: var(--text-success); }
    .score-medium { background: var(--bg-warning); color: var(--text-warning); }
    .score-weak { background: var(--bg-danger); color: var(--text-danger); }

    .lark-box {
      width: 100%;
      min-height: 150px;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
    }

    .copy-btn:hover { background: var(--bg-secondary); }

    .error-msg {
      color: var(--text-danger);
      font-size: 13px;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg-danger);
      border-radius: var(--radius);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    a { color: var(--text-info); }

    #file-input { display: none; }

    .paste-hint {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="ti ti-radar"></i> Scout</h1>
      <p>The opportunity scout for Nuseir: sharp-eyed, story-hungry, and allergic to wasted time.</p>
    </header>

    <div class="card">
      <div class="field-label"><i class="ti ti-photo-up"></i> Screenshots</div>
      <input type="file" id="file-input" accept="image/*" multiple />
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-inner" id="drop-inner">
          <i class="ti ti-photo-up"></i>
          <span>Click or drag screenshots here</span>
          <small>JPG, PNG, WEBP — multiple files OK</small>
        </div>
        <div class="preview-grid" id="preview-grid"></div>
      </div>
      <p class="paste-hint">Or press Ctrl+V / Cmd+V anywhere to paste a screenshot</p>

      <div style="margin-top: 1.25rem;">
        <div class="field-label"><i class="ti ti-clipboard-text"></i> Paste text (optional)</div>
        <textarea id="pitch-text" placeholder="Email body, DM, brief, deliverables, fee — paste anything..."></textarea>
      </div>

      <button class="run-btn" id="run-btn" onclick="runAssessment()">
        <i class="ti ti-sparkles"></i> Scout this opportunity
      </button>

      <div id="error-msg" class="error-msg" style="display:none;"></div>
    </div>

    <div id="result-area" style="display:none;"></div>
  </div>

  <script>
    const images = [];
    let lastLarkMessage = '';
    let lastAssessment = null;
    const dropZone = document.getElementById('drop-zone');
    const previewGrid = document.getElementById('preview-grid');
    const dropInner = document.getElementById('drop-inner');
    const fileInput = document.getElementById('file-input');

    window.addEventListener('load', retryPendingLarkTodo);
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      Array.from(items).filter(i => i.type.startsWith('image/')).forEach(item => {
        const file = item.getAsFile();
        if (file) processFile(file);
      });
    });

    function handleFiles(files) { Array.from(files).forEach(processFile); }

    async function processFile(file) {
      const compressed = await compressImage(file);
      const reader = new FileReader();
      reader.onload = e => {
        const id = Date.now() + Math.random();
        images.push({ id, base64: e.target.result.split(',')[1], mediaType: compressed.type || 'image/jpeg', dataUrl: e.target.result });
        renderPreviews();
      };
      reader.readAsDataURL(compressed);
    }

    function compressImage(file) {
      return new Promise(resolve => {
        if (!file.type.startsWith('image/')) return resolve(file);

        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => {
          img.onload = () => {
            const maxSide = 1600;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => resolve(blob || file), 'image/jpeg', 0.82);
          };
          img.onerror = () => resolve(file);
          img.src = e.target.result;
        };

        reader.onerror = () => resolve(file);
        reader.readAsDataURL(file);
      });
    }

    function renderPreviews() {
      dropInner.style.display = images.length ? 'none' : 'flex';
      previewGrid.innerHTML = images.map(img => `
        <div class="thumb-wrap">
          <img class="preview-thumb" src="${img.dataUrl}" alt="screenshot" />
          <button class="remove-img" onclick="removeImg('${img.id}')" aria-label="Remove">
            <i class="ti ti-x"></i>
          </button>
        </div>`).join('');
    }

    function removeImg(id) {
      const idx = images.findIndex(i => String(i.id) === String(id));
      if (idx > -1) images.splice(idx, 1);
      renderPreviews();
    }

    async function runAssessment() {
      const pitchText = document.getElementById('pitch-text').value.trim();
      const btn = document.getElementById('run-btn');
      const errorEl = document.getElementById('error-msg');
      const resultArea = document.getElementById('result-area');

      errorEl.style.display = 'none';

      if (!images.length && !pitchText) {
        errorEl.textContent = 'Add at least one screenshot or paste some text from the pitch.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Researching & assessing...';
      resultArea.style.display = 'none';

      const systemPrompt = `You are Scout, Patty's opportunity scout for Nuseir Yassin (Nas Daily / Nas.com). Your personality: sharp-eyed, commercially aware, story-hungry, mission-driven, and allergic to wasted executive time. You spot hidden upside, but you do not hype weak opportunities.

Keep the output extremely simple, executive-friendly, and easy for Nuseir to digest in under 20 seconds.

First classify the opportunity as exactly one of:
- Collaboration / Content Opportunity
- Speaking Engagement
- Partnership Proposal
- Non-Profit / Cause Initiative
- Media Opportunity
- Other

Then evaluate using universal criteria:
1. Reach: audience, distribution, credibility, media value, or amplification.
2. Relevance: fit with Nas Daily content, education, storytelling, entrepreneurship, global optimism, creator economy, useful products, or world-scale ideas.
3. Potential business: revenue, strategic access, sponsors, repeatability, partnership, or material upside.
4. Time Cost: whether this justifies Nuseir's personal attention. Attention is often scarcer than money.

Classification-specific calibration:

For Collaboration / Content Opportunity:
- Do not judge only by business value.
- Ask: Is there a compelling Nas Daily story here?
- Consider human story, educational value, surprising insights, global relevance, viral potential, and access to unique people/places/experiences.
- For pro-bono opportunities, ask: Would Nas Daily want to create content about this even with no commercial benefit?
- If yes, increase recommendation strength.
- Set type_score_label to "Story Potential".

For Speaking Engagement:
- Assume Nuseir's standard speaking fee is $50,000 USD.
- Evaluate fee offered, audience quality, event prestige, strategic access, future business, sponsorship potential, and content opportunities.
- If fee is below $50,000, do not automatically reject. Ask whether strategic value compensates for the fee gap.
- Strategic value can include founders, investors, government leaders, enterprise decision makers, potential sponsors, or significant media exposure.
- Set type_score_label to "Worth Nuseir's Time".

For Partnership Proposal:
- Evaluate strategic fit with the Nas Daily ecosystem, long-term potential, distribution value, revenue potential, repeatability, and ability to unlock future opportunities.
- Set type_score_label to "Partnership Potential".

For Non-Profit / Cause Initiative:
- Evaluate mission alignment rather than revenue.
- Ask: Does this advance the broader Nas Daily mission?
- Consider education, human progress, opportunity creation, entrepreneurship, global understanding, and positive impact.
- Also evaluate organization credibility, ability to execute, storytelling value, and audience relevance.
- Set type_score_label to "Mission Impact".

For Media Opportunity:
- Evaluate audience quality, credibility, reach, narrative control, reputational upside/downside, and whether it advances Nuseir's positioning.
- Set type_score_label to "Media Value".

For Other:
- Identify the real opportunity logic and set type_score_label to "Opportunity Value".

Final decision philosophy, in order:
1. Great stories
2. Strategic leverage
3. Mission alignment
4. Revenue and business opportunities
5. Efficient use of Nuseir's time

Before issuing YES / MAYBE / NO, ask: Will future Nuseir be glad we spent time on this opportunity? Use that as the final calibration check.

Formatting discipline:
- Always rewrite awkward inbound phrasing into clean professional English.
- Do not copy phrases like "wants Invitation for Nuseir" or other malformed wording.
- Do not unnecessarily repeat Nuseir's name inside the same sentence.
- proposal_name should be a short scan-friendly name, usually the brand/event/show/foundation name.
- proposal_summary must be 1-2 complete sentences focused on what is being proposed.
- decision_reason should be 1 complete sentence explaining the final verdict in plain executive language.

Use web search when possible to verify reach, credibility, and recent activity.

Respond ONLY in valid JSON, no markdown fences, with exactly these keys:
{
  "brand": "brand/person/opportunity name, or Unknown",
  "proposal_name": "short readable title, usually the brand/event/show/foundation name",
  "opportunity_type": "Collaboration / Content Opportunity OR Speaking Engagement OR Partnership Proposal OR Non-Profit / Cause Initiative OR Media Opportunity OR Other",
  "verdict": "YES" or "MAYBE" or "NO",
  "one_line_take": "one short sentence with the simple reason",
  "decision_reason": "one complete sentence explaining the verdict",
  "proposal_summary": "1-2 polished complete sentences explaining the proposal; rewrite awkward grammar",
  "timeline": "dates or timeline if stated, otherwise Not stated",
  "budget": "budget, fee, paid/pro-bono status if stated, otherwise Not stated",
  "social_links": "website/social links if found or stated, otherwise Not stated",
  "type_score_label": "Story Potential OR Worth Nuseir's Time OR Partnership Potential OR Mission Impact OR Media Value OR Opportunity Value",
  "type_score": "HIGH" or "MEDIUM" or "LOW",
  "type_score_reason": "max 14 words",
  "reach_score": "STRONG" or "MEDIUM" or "WEAK",
  "reach_reason": "max 14 words",
  "relevance_score": "STRONG" or "MEDIUM" or "WEAK",
  "relevance_reason": "max 14 words",
  "business_score": "STRONG" or "MEDIUM" or "WEAK",
  "business_reason": "max 14 words",
  "time_cost_score": "WORTH IT" or "BORDERLINE" or "NOT WORTH IT",
  "time_cost_reason": "max 14 words explaining whether it justifies Nuseir's attention",
  "ask": "what they want from Nuseir in one short sentence",
  "next_step": "one simple action Patty should take"
}`;

      const userContent = [];
      images.forEach(img => {
        userContent.push({ type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.base64 } });
      });
      let userText = 'Scout this opportunity for Nuseir. Classify it first, then evaluate Reach, Relevance, Potential Business, Time Cost, and the type-specific opportunity score.';
      if (pitchText) userText += '\n\nAdditional text:\n' + pitchText;
      userContent.push({ type: 'text', text: userText });

      try {
        const response = await fetch('/api/assess', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system: systemPrompt,
            content: userContent
          })
        });

        const raw = await response.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          throw new Error('The server returned an unexpected response. Try fewer screenshots or redeploy the latest files.');
        }
        if (!response.ok) throw new Error(data.error || 'Assessment failed.');
        renderResult(data);
      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong. Check your connection and try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-sparkles"></i> Scout this opportunity';
      }
    }

    function renderResult(r) {
      const area = document.getElementById('result-area');
      const vClass = r.verdict === 'YES' ? 'verdict-yes' : r.verdict === 'NO' ? 'verdict-no' : 'verdict-maybe';
      const vIcon = r.verdict === 'YES' ? 'ti-circle-check' : r.verdict === 'NO' ? 'ti-circle-x' : 'ti-alert-circle';
      lastAssessment = r;
      lastLarkMessage = buildLarkMessage(r);

      area.innerHTML = `
        <div class="result-card">
          <div class="result-section">
            <div class="result-label"><i class="ti ti-flag"></i> Recommendation</div>
            <div class="verdict-row">
              <span class="verdict-badge ${vClass}"><i class="ti ${vIcon}"></i> ${escapeHtml(r.verdict || 'MAYBE')}</span>
              <p class="result-content" style="flex:1; min-width:180px;">${escapeHtml(r.one_line_take || '')}</p>
            </div>
          </div>
          <div class="result-section">
            <div class="result-label"><i class="ti ti-category"></i> Opportunity type</div>
            <p class="result-content">${escapeHtml(r.opportunity_type || 'Other')}</p>
          </div>
          <div class="result-section">
            <div class="result-label"><i class="ti ti-target-arrow"></i> Nuseir criteria</div>
            <div class="criteria-grid">
              ${renderCriterion(r.type_score_label || 'Opportunity Value', r.type_score, r.type_score_reason)}
              ${renderCriterion('Reach', r.reach_score, r.reach_reason)}
              ${renderCriterion('Relevance', r.relevance_score, r.relevance_reason)}
              ${renderCriterion('Business', r.business_score, r.business_reason)}
              ${renderCriterion('Time Cost', r.time_cost_score, r.time_cost_reason)}
            </div>
          </div>
          <div class="result-section">
            <div class="result-label"><i class="ti ti-list-check"></i> Ask</div>
            <p class="result-content">${escapeHtml(r.ask || '')}</p>
          </div>
          <div class="result-section">
            <div class="result-label"><i class="ti ti-arrow-forward-up"></i> Next step</div>
            <p class="result-content">${escapeHtml(r.next_step || '')}</p>
          </div>
          <div class="result-section">
            <div class="result-label"><i class="ti ti-message-forward"></i> Lark message</div>
            <button class="copy-btn" onclick="copyLarkMessage()"><i class="ti ti-copy"></i> Copy for Lark</button>
            <button class="copy-btn" onclick="sendLarkMessage()" style="margin-left:8px;"><i class="ti ti-send"></i> Send to Nuseir</button>
            <button class="copy-btn" onclick="addToLarkTodo()" style="margin-left:8px;"><i class="ti ti-square-check"></i> Add to Nuseir's To-Do</button>
            <textarea class="lark-box" id="lark-message-box">${escapeHtml(lastLarkMessage)}</textarea>
          </div>
        </div>`;
      area.style.display = 'block';
      area.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderCriterion(name, score, reason) {
      const scoreText = score || 'MEDIUM';
      const scoreClass = getScoreClass(scoreText);
      return `
        <div class="criterion">
          <span class="criterion-name">${escapeHtml(name)}</span>
          <span class="criterion-score ${scoreClass}">${escapeHtml(scoreText)}</span>
          <span>${escapeHtml(reason || '')}</span>
        </div>`;
    }

    function getScoreClass(score) {
      if (['STRONG', 'HIGH', 'YES', 'WORTH IT'].includes(score)) return 'score-strong';
      if (['WEAK', 'LOW', 'NO', 'NOT WORTH IT'].includes(score)) return 'score-weak';
      return 'score-medium';
    }

    function buildLarkMessage(r) {
      const title = `${formatOpportunityType(r.opportunity_type)}: ${r.proposal_name || r.brand || 'Opportunity'}`;
      return `${title}

${r.proposal_summary || r.ask || 'No proposal summary available.'}

Timeline - ${r.timeline || 'Not stated'}
Budget - ${r.budget || 'Not stated'}
Website/Social Links - ${r.social_links || 'Not stated'}

My Take: ${r.verdict || 'MAYBE'}

${r.type_score_label || 'Opportunity Value'}: ${r.type_score || 'MEDIUM'}
Reach: ${r.reach_score || 'MEDIUM'}
Relevance: ${r.relevance_score || 'MEDIUM'}
Potential Business: ${r.business_score || 'MEDIUM'}
Time Cost: ${r.time_cost_score || 'BORDERLINE'}

Reason:
${r.decision_reason || r.one_line_take || buildFallbackReason(r)}`;
    }

    function formatOpportunityType(type) {
      if (type === 'Collaboration / Content Opportunity') return 'Content Opportunity';
      if (type === 'Non-Profit / Cause Initiative') return 'Non-Profit Initiative';
      return type || 'Opportunity';
    }

    function buildFallbackReason(r) {
      const parts = [
        r.type_score_reason,
        r.reach_reason,
        r.relevance_reason,
        r.business_reason,
        r.time_cost_reason
      ].filter(Boolean);
      return parts.length ? parts.join(' ') : 'Scout found limited evidence that this opportunity justifies Nuseir’s time.';
    }

    async function copyLarkMessage() {
      const btn = document.querySelector('.copy-btn');
      try {
        await navigator.clipboard.writeText(getCurrentLarkMessage());
        btn.innerHTML = '<i class="ti ti-check"></i> Copied';
        setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copy for Lark'; }, 1400);
      } catch {
        btn.innerHTML = '<i class="ti ti-alert-circle"></i> Select text below';
        setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy"></i> Copy for Lark'; }, 1800);
      }
    }

    function getCurrentLarkMessage() {
      return document.getElementById('lark-message-box')?.value || lastLarkMessage;
    }

    function getScoutAdminKey() {
      let key = localStorage.getItem('scout_admin_key') || '';
      if (!key) {
        key = prompt('Enter Patty admin key to use this restricted Scout action:') || '';
        if (key) localStorage.setItem('scout_admin_key', key);
      }
      return key;
    }

    function clearScoutAdminKey() {
      localStorage.removeItem('scout_admin_key');
    }

    async function sendLarkMessage() {
      const buttons = document.querySelectorAll('.copy-btn');
      const btn = buttons[1];
      const message = getCurrentLarkMessage().trim();

      if (!message) {
        alert('No message draft to send.');
        return;
      }

      const approved = confirm(`Send this Lark message to Nuseir?\n\n${message.slice(0, 700)}${message.length > 700 ? '\n...' : ''}`);
      if (!approved) return;

      try {
        const adminKey = getScoutAdminKey();
        if (!adminKey) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Sending...';

        const response = await fetch('/api/lark/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Scout-Admin-Key': adminKey },
          body: JSON.stringify({ message, assessment: lastAssessment })
        });
        const data = await response.json();
        if (response.status === 403) clearScoutAdminKey();
        if (!response.ok) throw new Error(data.error || 'Could not send message.');

        btn.innerHTML = '<i class="ti ti-check"></i> Sent';
        setTimeout(() => { btn.innerHTML = '<i class="ti ti-send"></i> Send to Nuseir'; btn.disabled = false; }, 1600);
      } catch (err) {
        btn.innerHTML = '<i class="ti ti-alert-circle"></i> Setup needed';
        alert(err.message || 'Could not send message.');
        setTimeout(() => { btn.innerHTML = '<i class="ti ti-send"></i> Send to Nuseir'; btn.disabled = false; }, 1800);
      }
    }

    async function addToLarkTodo() {
      const buttons = document.querySelectorAll('.copy-btn');
      const btn = buttons[2];
      const title = `Decide on ${lastAssessment?.proposal_name || lastAssessment?.brand || 'opportunity'}`;
      const payload = {
        title,
        details: getCurrentLarkMessage(),
        taskListUrl: 'https://applink.larksuite.com/client/todo/task_list?guid=b7545c13-3909-49d6-8cb5-6acf92db994f'
      };

      try {
        const adminKey = getScoutAdminKey();
        if (!adminKey) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Adding...';

        const response = await fetch('/api/lark/todo?auth=user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Scout-Admin-Key': adminKey },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (response.status === 403) clearScoutAdminKey();
        if (response.status === 401 && data.needs_lark_login) {
          sessionStorage.setItem('pending_lark_todo', JSON.stringify(payload));
          window.location.href = data.auth_url || '/api/lark/oauth/start';
          return;
        }
        if (!response.ok) throw new Error(data.error || 'Could not add to Lark.');

        btn.innerHTML = '<i class="ti ti-check"></i> Added';
        setTimeout(() => { btn.innerHTML = "<i class=\"ti ti-square-check\"></i> Add to Nuseir's To-Do"; btn.disabled = false; }, 1600);
      } catch (err) {
        btn.innerHTML = '<i class="ti ti-alert-circle"></i> Setup needed';
        alert(err.message);
        setTimeout(() => { btn.innerHTML = "<i class=\"ti ti-square-check\"></i> Add to Nuseir's To-Do"; btn.disabled = false; }, 1800);
      }
    }

    async function retryPendingLarkTodo() {
      const params = new URLSearchParams(window.location.search);
      const pending = sessionStorage.getItem('pending_lark_todo');
      if (params.get('lark_connected') !== '1' || !pending) return;

      const cleanUrl = window.location.pathname;
      window.history.replaceState({}, '', cleanUrl);

      try {
        const payload = JSON.parse(pending);
        const response = await fetch('/api/lark/todo?auth=user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Scout-Admin-Key': getScoutAdminKey() },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (response.status === 403) clearScoutAdminKey();
        if (!response.ok) throw new Error(data.error || 'Could not add to Lark.');

        sessionStorage.removeItem('pending_lark_todo');
        alert("Added to Nuseir's To-Do.");
      } catch (err) {
        alert(err.message || 'Lark connected, but the task could not be added.');
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
